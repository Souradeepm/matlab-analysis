<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#e4edf7"/>
    </linearGradient>

    <linearGradient id="subTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d9dde2"/>
      <stop offset="100%" stop-color="#bcc4ce"/>
    </linearGradient>

    <linearGradient id="subFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#aeb6c1"/>
      <stop offset="100%" stop-color="#8f98a5"/>
    </linearGradient>

    <linearGradient id="subSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#98a1ad"/>
      <stop offset="100%" stop-color="#7f8895"/>
    </linearGradient>

    <linearGradient id="filmTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ec8ff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3fa7ff" stop-opacity="0.78"/>
    </linearGradient>

    <linearGradient id="filmFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4f99d8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#2b6da7" stop-opacity="0.9"/>
    </linearGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffe794"/>
      <stop offset="40%" stop-color="#ffd25c"/>
      <stop offset="100%" stop-color="#c99a17"/>
    </linearGradient>

    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#2a77c9"/>
    </marker>

    <marker id="arrowRed" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#d84b54"/>
    </marker>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#1f3245" flood-opacity="0.28"/>
    </filter>

    <pattern id="grainDots" x="0" y="0" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="6" cy="5" r="1.8" fill="#ffffff" fill-opacity="0.7"/>
      <circle cx="19" cy="10" r="1.5" fill="#d5ecff" fill-opacity="0.8"/>
      <circle cx="9" cy="18" r="1.3" fill="#eaf5ff" fill-opacity="0.65"/>
      <circle cx="21" cy="22" r="1.1" fill="#c7e2ff" fill-opacity="0.8"/>
    </pattern>

    <clipPath id="filmTopClip">
      <polygon points="500,320 1160,320 1290,400 630,400"/>
    </clipPath>
  </defs>

  <rect x="0" y="0" width="1600" height="1000" fill="url(#bg)"/>

  <!-- AC source -->
  <g transform="translate(130,355)" filter="url(#softShadow)">
    <circle cx="0" cy="0" r="68" fill="#ffffff" stroke="#365a7a" stroke-width="4"/>
    <path d="M -42 0 C -28 -22 -14 -22 0 0 C 14 22 28 22 42 0" fill="none" stroke="#2a77c9" stroke-width="6" stroke-linecap="round"/>
    <text x="0" y="105" text-anchor="middle" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#1c3f60">AC Source</text>
    <text x="0" y="136" text-anchor="middle" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#365a7a">~ V(t)</text>
  </g>

  <!-- Substrate prism (Al2O3 sapphire/alumina) -->
  <g filter="url(#softShadow)">
    <!-- top face -->
    <polygon points="430,290 1230,290 1400,410 600,410" fill="url(#subTop)" stroke="#6e7885" stroke-width="2.2"/>

    <!-- front face -->
    <polygon points="600,410 1400,410 1400,700 600,700" fill="url(#subFront)" stroke="#6e7885" stroke-width="2.2"/>

    <!-- right side face -->
    <polygon points="1230,290 1400,410 1400,700 1230,580" fill="url(#subSide)" stroke="#6e7885" stroke-width="2.2"/>

    <!-- left side face -->
    <polygon points="430,290 600,410 600,700 430,580" fill="#8f98a5" stroke="#6e7885" stroke-width="2.2"/>
  </g>

  <!-- Thin film layer on top -->
  <g>
    <!-- top film -->
    <polygon points="500,320 1160,320 1290,400 630,400" fill="url(#filmTop)" stroke="#2d79b8" stroke-width="2.3"/>

    <!-- grain map clipped to film top -->
    <g clip-path="url(#filmTopClip)">
      <polygon points="500,320 615,326 600,372 510,368" fill="#8ed1ff" fill-opacity="0.54"/>
      <polygon points="615,326 730,332 712,378 600,372" fill="#79c6ff" fill-opacity="0.52"/>
      <polygon points="730,332 845,338 828,384 712,378" fill="#98d7ff" fill-opacity="0.5"/>
      <polygon points="845,338 960,344 944,390 828,384" fill="#70c0ff" fill-opacity="0.52"/>
      <polygon points="960,344 1080,352 1066,396 944,390" fill="#8bcfff" fill-opacity="0.5"/>
      <polygon points="1080,352 1160,356 1160,398 1066,396" fill="#73c2ff" fill-opacity="0.52"/>

      <polygon points="510,368 600,372 590,400 500,397" fill="#6cbcff" fill-opacity="0.5"/>
      <polygon points="600,372 712,378 702,400 590,400" fill="#88ceff" fill-opacity="0.48"/>
      <polygon points="712,378 828,384 818,400 702,400" fill="#66b8f8" fill-opacity="0.5"/>
      <polygon points="828,384 944,390 934,400 818,400" fill="#7ec8ff" fill-opacity="0.5"/>
      <polygon points="944,390 1066,396 1058,400 934,400" fill="#63b4f1" fill-opacity="0.52"/>
      <polygon points="1066,396 1160,398 1160,400 1058,400" fill="#86ccff" fill-opacity="0.52"/>

      <!-- subtle intragranular texture -->
      <polygon points="500,320 1160,320 1290,400 630,400" fill="url(#grainDots)" opacity="0.34"/>
    </g>

    <!-- front film edge (thin thickness) -->
    <polygon points="630,400 1290,400 1290,424 630,424" fill="url(#filmFront)" stroke="#2d79b8" stroke-width="1.8"/>

    <!-- right film edge -->
    <polygon points="1160,320 1290,400 1290,424 1160,344" fill="#317fbe" stroke="#2d79b8" stroke-width="1.8"/>
  </g>

  <!-- Grain boundaries on film top (explicit polygon boundaries) -->
  <g clip-path="url(#filmTopClip)" stroke="#d84b54" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.98">
    <path d="M 615 326 L 600 372"/>
    <path d="M 730 332 L 712 378"/>
    <path d="M 845 338 L 828 384"/>
    <path d="M 960 344 L 944 390"/>
    <path d="M 1080 352 L 1066 396"/>

    <path d="M 510 368 L 600 372 L 712 378 L 828 384 L 944 390 L 1066 396 L 1160 398"/>
    <path d="M 590 400 L 600 372"/>
    <path d="M 702 400 L 712 378"/>
    <path d="M 818 400 L 828 384"/>
    <path d="M 934 400 L 944 390"/>
    <path d="M 1058 400 L 1066 396"/>
  </g>

  <!-- Gold pads on film -->
  <g filter="url(#softShadow)">
    <polygon points="540,334 645,334 665,348 560,348" fill="url(#gold)" stroke="#9b730a" stroke-width="2"/>
    <polygon points="540,334 560,348 560,372 540,358" fill="#c79618" stroke="#9b730a" stroke-width="1.5"/>
    <polygon points="560,348 665,348 665,372 560,372" fill="#d6a92a" stroke="#9b730a" stroke-width="1.5"/>

    <polygon points="1020,372 1125,372 1145,386 1040,386" fill="url(#gold)" stroke="#9b730a" stroke-width="2"/>
    <polygon points="1020,372 1040,386 1040,410 1020,396" fill="#c79618" stroke="#9b730a" stroke-width="1.5"/>
    <polygon points="1040,386 1145,386 1145,410 1040,410" fill="#d6a92a" stroke="#9b730a" stroke-width="1.5"/>
  </g>

  <!-- Wires from AC source to pads -->
  <g stroke="#365a7a" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M 198 325 C 280 285, 360 290, 530 340"/>
    <path d="M 198 385 C 290 430, 440 450, 1028 388"/>
  </g>

  <!-- Electron oscillation in grain interiors (blue arrows + electrons) -->
  <g>
    <g stroke="#2a77c9" stroke-width="2.8" fill="none" marker-end="url(#arrowBlue)">
      <path d="M 690 350 L 740 344"/>
      <path d="M 740 344 L 690 350"/>
      <path d="M 840 356 L 895 350"/>
      <path d="M 895 350 L 840 356"/>
      <path d="M 980 368 L 1035 362"/>
      <path d="M 1035 362 L 980 368"/>
      <path d="M 760 380 L 815 374"/>
      <path d="M 815 374 L 760 380"/>
    </g>

    <g fill="#ffffff" stroke="#1f5f9d" stroke-width="2">
      <circle cx="715" cy="347" r="7"/>
      <circle cx="868" cy="353" r="7"/>
      <circle cx="1007" cy="365" r="7"/>
      <circle cx="787" cy="377" r="7"/>
    </g>

    <g fill="#1f5f9d" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="600">
      <text x="708" y="352">e⁻</text>
      <text x="861" y="358">e⁻</text>
      <text x="1000" y="370">e⁻</text>
      <text x="780" y="382">e⁻</text>
    </g>
  </g>

  <!-- Electron oscillation along grain boundaries (red arrows + electrons) -->
  <g>
    <g stroke="#d84b54" stroke-width="2.8" fill="none" marker-end="url(#arrowRed)">
      <path d="M 706 374 L 742 366"/>
      <path d="M 742 366 L 706 374"/>
      <path d="M 936 388 L 972 379"/>
      <path d="M 972 379 L 936 388"/>
      <path d="M 952 351 L 978 342"/>
      <path d="M 978 342 L 952 351"/>
    </g>

    <g fill="#ffffff" stroke="#aa2f39" stroke-width="2">
      <circle cx="724" cy="370" r="6.5"/>
      <circle cx="954" cy="384" r="6.5"/>
      <circle cx="964" cy="347" r="6.5"/>
    </g>

    <g fill="#aa2f39" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="600">
      <text x="718" y="375">e⁻</text>
      <text x="948" y="389">e⁻</text>
      <text x="958" y="352">e⁻</text>
    </g>
  </g>

  <!-- Labels -->
  <g font-family="Segoe UI, Arial, sans-serif" fill="#21384f">
    <text x="735" y="286" font-size="30" font-weight="700">Thin Conductive Film (Polycrystalline)</text>
    <text x="760" y="745" font-size="34" font-weight="700">Sapphire / Alumina Substrate (Al₂O₃)</text>

    <text x="528" y="316" font-size="23" font-weight="700" fill="#7c5a00">Au Pad</text>
    <text x="1028" y="355" font-size="23" font-weight="700" fill="#7c5a00">Au Pad</text>

    <text x="121" y="225" font-size="24" font-weight="700" fill="#2a77c9">Alternating Electric Field</text>
    <path d="M 275 235 C 360 238, 420 260, 546 334" stroke="#2a77c9" stroke-width="2.2" fill="none" marker-end="url(#arrowBlue)"/>

    <text x="1180" y="160" font-size="24" font-weight="700" fill="#d84b54">Grain Boundaries</text>
    <path d="M 1178 170 C 1108 194, 1062 240, 1022 326" stroke="#d84b54" stroke-width="2.2" fill="none" marker-end="url(#arrowRed)"/>

    <text x="1226" y="228" font-size="23" font-weight="700" fill="#2a77c9">Grain Interiors</text>
    <path d="M 1223 236 C 1128 258, 1065 295, 905 353" stroke="#2a77c9" stroke-width="2.2" fill="none" marker-end="url(#arrowBlue)"/>

    <text x="140" y="850" font-size="24" fill="#2e4f70">Blue arrows: electron oscillation within grains</text>
    <text x="140" y="885" font-size="24" fill="#8f2f38">Red arrows: electron oscillation along grain boundaries</text>
  </g>
</svg>
